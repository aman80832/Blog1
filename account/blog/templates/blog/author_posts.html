<!DOCTYPE html>
<html>
<head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'blog/css/style.css' %}">
    <title>Author Posts</title>
</head>

<body>
    <!-- 🔥 TITLE -->
    <h2 class="main-title">Posts by {{ profile.name }}</h2>

    <div class="container">

        {% if posts %}
            {% for post in posts %}

                <!-- 🔥 BLOG CARD -->
                <div class="blog-card">

                    <h2>{{ post.title }}</h2>

                    <p class="content">
                        {{ post.content }}
                    </p>

                    <small class="author">
                        By {{ profile.name }}
                    </small>

                </div>

            {% endfor %}
        {% else %}

            <p style="text-align:center;">No posts by this author 😅</p>

        {% endif %}

    </div>

</body>
</html>
