<html>
<head>
    <title>Comments on Blog</title>
{% load static %}
        <link rel="stylesheet" href="{% static 'blog/css/style.css' %}">
</head>

<body>
    <div class="container">

        <h1 class="main-title"> Blog Comments</h1>

        {% for post in posts %}
        <div class="blog-card">

            <!-- Post Title -->
            <h2>{{ post.title }}</h2>

            <!-- Post Content -->
            <p class="content">{{ post.content }}</p>

            <h4>Comments:</h4>

            {% for comment in post.comments.all %}
                <div class="comment-box">
                    <p><strong>{{ comment.name }}</strong></p>
                    <p class="content">{{ comment.text }}</p>
                </div>
                <hr>
            {% empty %}
                <p>No comments yet 😶</p>
            {% endfor %}

            <!-- Add Comment Button -->
            <a href="{% url 'add_comment' post.id %}" class="comment-btn">
                ➕ Add Comment
            </a>

        </div>
        {% endfor %}

    </div>

</body>
</html>
