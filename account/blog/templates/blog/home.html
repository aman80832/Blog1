<html>
    <head>
        {% load static %}
        <link rel="stylesheet" href="{% static 'blog/css/style.css' %}">
        <title> MY FRIST BLOG </title>
    </head>
    <body>
        <div class="container">
        <h2 class="main-title"> ALL BLOG POSTS </h2>
        <div class="navbar">
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'profile' %}">Profile</a>
     <a href="{% url 'add_blogs' %}">create post</a>
      <a href="{% url 'comments_page' %}">comments</a>
       <a href="{% url 'add_profile' %}">Add Profile</a>
        </div>
        {% for post in posts %}
        <div class="blog-card">
            <h2>{{ post.title }}</h2>
            <br>
            <p class="content"><i>{{ post.content }}</i></p>
            <br>
            <small class="author">{{ post.author}}</small>
        </div>
        {% endfor %}
    </div>
            </body>
    </html>
